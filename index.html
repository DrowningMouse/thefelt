<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Felt — Private Poker Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/style.css">
</head>
<body>

<!-- ═══ LANDING ═══ -->
<div id="landing" class="screen active">
  <div class="felt-pattern"></div>
  <div class="suit-bg tl">♠</div>
  <div class="suit-bg br">♦</div>
  <div class="landing-card">
    <div class="logo">
      <span class="logo-suits">♠ ♥ ♣ ♦</span>
      <div class="logo-title">The Felt</div>
      <div class="logo-sub">Private Poker Club</div>
    </div>
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchAuthTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchAuthTab('signup')">Join Club</button>
    </div>
    <div id="login-form">
      <div class="field">
        <label>Email</label>
        <input id="login-email" type="email" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input id="login-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
        <div class="error-msg" id="login-err"></div>
      </div>
      <button class="btn-gold" onclick="doLogin()" id="login-btn">Deal Me In</button>
      <div style="text-align:center;margin-top:0.75rem">
        <button onclick="showResetForm()" style="background:none;border:none;color:var(--text-dim);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:underline">Forgot password?</button>
      </div>
    </div>

    <!-- Reset Password Form -->
    <div id="reset-form" style="display:none">
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:1rem;text-align:center">Enter your email to reset your password.</div>
      <div class="field">
        <label>Email</label>
        <input id="reset-email" type="email" placeholder="your@email.com">
      </div>
      <div id="reset-step2" style="display:none">
        <div class="field">
          <label>New Password</label>
          <input id="reset-newpass" type="password" placeholder="Min. 6 characters" onkeydown="if(event.key==='Enter')doResetPassword()">
        </div>
        <div class="field">
          <label>Confirm New Password</label>
          <input id="reset-confirmpass" type="password" placeholder="Repeat new password" onkeydown="if(event.key==='Enter')doResetPassword()">
        </div>
      </div>
      <div class="error-msg" id="reset-err"></div>
      <button class="btn-gold" id="reset-btn" onclick="doResetStep()" style="margin-top:0.5rem">Continue</button>
      <div style="text-align:center;margin-top:0.75rem">
        <button onclick="showResetForm(false)" style="background:none;border:none;color:var(--text-dim);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:underline">Back to sign in</button>
      </div>
    </div>
    <div id="signup-form" style="display:none">
      <div class="field">
        <label>Club Password</label>
        <input id="signup-site-pass" type="password" placeholder="Ask your host">
      </div>
      <div class="field">
        <label>Email</label>
        <input id="signup-email" type="email" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Your Name</label>
        <input id="signup-realname" placeholder="e.g. Dylan Minto" maxlength="40">
      </div>
      <div class="field">
        <label>Table Name <span style="color:var(--text-dim);font-size:11px">(your poker nickname)</span></label>
        <input id="signup-username" placeholder="e.g. Shortstack" maxlength="20">
      </div>
      <div class="field">
        <label>Password</label>
        <input id="signup-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doSignup()">
      </div>
      <button class="btn-gold" onclick="doSignup()" id="signup-btn">Claim My Seat</button>
      <div class="error-msg" id="signup-err" style="margin-top:8px"></div>
    </div>
    <div class="site-pass-hint" id="auth-hint">Sign in with your email and password</div>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app" class="screen">
  <div class="topbar">
    <div class="topbar-logo">The Felt</div>
    <div class="user-pill">
      <div class="avatar" id="topbar-avatar"></div>
      <span id="topbar-username"></span>
      <button class="logout-btn" onclick="logout()">Out</button>
    </div>
  </div>
  <div class="nav-bar">
    <div class="nav-item active" data-tab="dashboard" onclick="switchTab('dashboard',this)">Dashboard</div>
    <div class="nav-item" data-tab="live" onclick="switchTab('live',this)" id="live-tab">
      Live Game <span id="live-dot" style="width:6px;height:6px;border-radius:50%;background:#6ecf8a;display:none;margin-left:3px;animation:pulse 1.5s infinite;vertical-align:middle;display:inline-block;opacity:0"></span>
    </div>
    <div class="nav-item" data-tab="history" onclick="switchTab('history',this)">History</div>
    <div class="nav-item" data-tab="profile" onclick="switchTab('profile',this)">Me</div>
    <div class="nav-item" data-tab="stats" onclick="switchTab('stats',this)">Stats</div>
    <div class="nav-item" id="admin-tab" data-tab="admin" onclick="switchTab('admin',this)" style="display:none">Admin</div>
  </div>
  <div class="content">
    <div id="tab-dashboard"></div>
    <div id="tab-live" style="display:none"></div>
    <div id="tab-history" style="display:none"></div>
    <div id="tab-profile" style="display:none"></div>
    <div id="tab-stats" style="display:none"></div>
    <div id="tab-admin" style="display:none"></div>
  </div>
</div>

<!-- Add Player Modal -->
<div class="modal-overlay" id="player-modal" onclick="if(event.target===this)closePlayerModal()">
  <div class="modal-box">
    <div class="modal-title">Add Player to Game</div>
    <div id="player-modal-list"></div>
    <div class="modal-footer"><button class="btn-sm" onclick="closePlayerModal()">Cancel</button></div>
  </div>
</div>

<!-- Game Detail Modal -->
<div class="modal-overlay" id="detail-modal" onclick="if(event.target===this)closeDetailModal()">
  <div class="modal-box" id="detail-modal-body"></div>
</div>

<!-- Re-buy Modal -->
<div class="modal-overlay" id="rebuy-modal" onclick="if(event.target===this)closeRebuyModal()">
  <div class="modal-box" style="max-width:320px">
    <div class="modal-title" id="rebuy-title">Add Buy-in</div>
    <div style="margin-bottom:1rem;font-size:13px;color:var(--text-muted)" id="rebuy-sub"></div>
    <span class="g-label">Amount ($)</span>
    <input class="g-input" type="number" min="1" id="rebuy-amount" placeholder="e.g. 100">
    <div class="error-msg" id="rebuy-err"></div>
    <div class="modal-footer">
      <button class="btn-sm" onclick="closeRebuyModal()">Cancel</button>
      <button class="btn-sm primary" onclick="confirmRebuy()">Add Buy-in</button>
    </div>
  </div>
</div>

<!-- Live Cash Out Modal -->
<div class="modal-overlay" id="live-cashout-modal" onclick="if(event.target===this)closeLiveCashout()">
  <div class="modal-box" style="max-width:320px">
    <div class="modal-title" id="live-cashout-title">Cash Out</div>
    <div style="margin-bottom:1rem;font-size:13px;color:var(--text-muted)" id="live-cashout-sub"></div>
    <span class="g-label">Final chip count ($)</span>
    <input class="g-input" type="number" min="0" id="live-cashout-amount" placeholder="0.00">
    <div class="error-msg" id="live-cashout-err"></div>
    <div class="modal-footer">
      <button class="btn-sm" onclick="closeLiveCashout()">Cancel</button>
      <button class="btn-sm primary" onclick="confirmLiveCashout()">Confirm</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase CDN (loaded before app.js) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- App (plain script, all functions global) -->
<script src="src/app.js"></script>
</body>
</html>
